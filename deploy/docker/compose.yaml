services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legavi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legavi}
      POSTGRES_DB: ${POSTGRES_DB:-legavi}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legavi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  # caddy:
  #   image: caddy:2
  #   ports:
  #     - "8443:8443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #   depends_on:
  #     - postgres
  #     - mailhog

volumes:
  postgres_data:
